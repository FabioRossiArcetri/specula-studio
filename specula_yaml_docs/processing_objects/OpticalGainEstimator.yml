OpticalGainEstimator:
  class_name: OpticalGainEstimator
  bases:
  - BaseProcessingObj
  parameters:
    gain:
      type: float
      default: REQUIRED
      kind: value
    initial_optical_gain:
      type: float
      default: 1.0
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_demod_delta_command:
      type: BaseValue
      kind: single
      desc: Demodulated delta command vector for optical gain estimation
    in_demod_command:
      type: BaseValue
      kind: single
      desc: Demodulated absolute command vector for optical gain estimation
  outputs:
  - name: optical_gain
    type: BaseValue
    desc: Estimated optical gain scalar or vector
  - name: output
    type: BaseValue
    desc: Output command vector corrected by optical gain
  output_names:
  - optical_gain
  - output
