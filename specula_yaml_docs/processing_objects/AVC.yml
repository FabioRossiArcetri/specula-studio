AVC:
  class_name: AVC
  bases:
  - BaseProcessingObj
  parameters:
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_measurement:
      type: BaseValue
      kind: single
      desc: Input measurement signal
  outputs:
  - name: out_comm
    type: BaseValue
    desc: Output correction command
  output_names:
  - out_comm
