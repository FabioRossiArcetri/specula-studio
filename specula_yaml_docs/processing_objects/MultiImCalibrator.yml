MultiImCalibrator:
  class_name: MultiImCalibrator
  bases:
  - BaseProcessingObj
  parameters:
    nmodes:
      type: int
      default: REQUIRED
      kind: value
    n_inputs:
      type: int
      default: REQUIRED
      kind: value
    data_dir:
      type: str
      default: REQUIRED
      kind: value
    im_tag:
      type: str
      default: null
      kind: value
    full_im_tag:
      type: str
      default: null
      kind: value
    overwrite:
      type: bool
      default: false
      kind: value
    pupilstop:
      type: Pupilstop
      default: null
      kind: object
    source_dict:
      type: list
      default: null
      kind: value
    dm:
      type: DM
      default: null
      kind: value
    sensor_dict:
      type: list
      default: null
      kind: value
    slopec_dict:
      type: list
      default: null
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_slopes_list:
      type: Slopes
      kind: single
      desc: List of input slope vectors, one per WFS/sensor pair
    in_commands_list:
      type: BaseValue
      kind: single
      desc: List of input command vectors, one per WFS/sensor pair
  outputs:
  - name: out_intmat_list
    type: Intmat
    desc: List of per-WFS/sensor interaction matrices
  - name: out_intmat_full
    type: Intmat
    desc: Full stacked interaction matrix from all sensors
  output_names:
  - out_intmat_list
  - out_intmat_full
