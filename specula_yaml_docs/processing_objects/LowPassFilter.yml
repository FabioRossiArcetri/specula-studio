LowPassFilter:
  class_name: LowPassFilter
  bases:
  - IirFilter
  parameters:
    simul_params:
      type: SimulParams
      default: REQUIRED
      kind: reference
    cutoff_freq:
      type: float
      default: REQUIRED
      kind: value
    amplif_fact:
      type: float
      default: null
      kind: value
    n_ord:
      type: int
      default: null
      kind: value
    delay:
      type: float
      default: 0
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    delta_comm:
      type: BaseValue
      kind: single
      desc: Input delta command vector
    gain_mod:
      type: BaseValue
      kind: single
      desc: Optional gain modulation vector (optional)
  outputs:
  - name: out_comm
    type: BaseValue
    desc: Output command vector with delay applied
  - name: out_comm_no_delay
    type: BaseValue
    desc: Output command vector without delay (for POLC)
  output_names:
  - out_comm
  - out_comm_no_delay
