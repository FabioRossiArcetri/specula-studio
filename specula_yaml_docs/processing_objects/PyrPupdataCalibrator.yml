PyrPupdataCalibrator:
  class_name: PyrPupdataCalibrator
  bases:
  - BaseProcessingObj
  parameters:
    data_dir:
      type: str
      default: REQUIRED
      kind: value
    dt:
      type: float
      default: null
      kind: value
    thr1:
      type: float
      default: 0.1
      kind: value
    thr2:
      type: float
      default: 0.25
      kind: value
    obs_thr:
      type: float
      default: 0.8
      kind: value
    slopes_from_intensity:
      type: bool
      default: false
      kind: value
    output_tag:
      type: str
      default: null
      kind: value
    auto_detect_obstruction:
      type: bool
      default: true
      kind: value
    min_obstruction_ratio:
      type: float
      default: 0.05
      kind: value
    display_debug:
      type: bool
      default: false
      kind: value
    overwrite:
      type: bool
      default: false
      kind: value
    save_on_exit:
      type: bool
      default: true
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_i:
      type: Intensity
      kind: single
      desc: Input intensity image (optional)
    in_pixels:
      type: Pixels
      kind: single
      desc: Input pixel image (optional)
  outputs:
  - name: out_pupdata
    type: PupData
    desc: Calibrated pupil data with subaperture geometry
  output_names:
  - out_pupdata
