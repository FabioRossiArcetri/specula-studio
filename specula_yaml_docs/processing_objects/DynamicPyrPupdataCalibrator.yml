DynamicPyrPupdataCalibrator:
  class_name: DynamicPyrPupdataCalibrator
  bases:
  - PyrPupdataCalibrator
  parameters:
    data_dir:
      type: str
      default: REQUIRED
      kind: value
    dt:
      type: float
      default: null
      kind: value
    thr1:
      type: float
      default: 0.1
      kind: value
    thr2:
      type: float
      default: 0.25
      kind: value
    obs_thr:
      type: float
      default: 0.8
      kind: value
    slopes_from_intensity:
      type: bool
      default: false
      kind: value
    output_tag:
      type: str
      default: null
      kind: value
    auto_detect_obstruction:
      type: bool
      default: true
      kind: value
    min_obstruction_ratio:
      type: float
      default: 0.05
      kind: value
    display_debug:
      type: bool
      default: false
      kind: value
    overwrite:
      type: bool
      default: false
      kind: value
    save_on_exit:
      type: bool
      default: true
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_i:
      type: Intensity
      kind: single
      desc: Input intensity from the pyramid WFS detector (optional)
    in_pixels:
      type: Pixels
      kind: single
      desc: Input pixel data from the detector (optional)
    in_save:
      type: BaseValue
      kind: single
      desc: Trigger to save the current calibration data (optional)
    in_dt:
      type: BaseValue
      kind: single
      desc: Dynamically update the time step in seconds (optional)
    in_thr1:
      type: BaseValue
      kind: single
      desc: Dynamically update the first threshold (optional)
    in_thr2:
      type: BaseValue
      kind: single
      desc: Dynamically update the second threshold (optional)
    in_output_tag:
      type: BaseValue
      kind: single
      desc: Dynamically update the output tag (optional)
  outputs:
  - name: out_pupdata
    type: PupData
    desc: Calibrated pupil data with subaperture geometry
  - name: out_params
    type: BaseValue
    desc: Dictionary with current calibration parameters and status
  output_names:
  - out_pupdata
  - out_params
