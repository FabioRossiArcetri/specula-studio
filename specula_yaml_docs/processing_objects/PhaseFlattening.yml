PhaseFlattening:
  class_name: PhaseFlattening
  bases:
  - BaseProcessingObj
  parameters:
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_ef:
      type: ElectricField
      kind: single
      desc: Input electric field whose mean phase will be removed
  outputs:
  - name: out_ef
    type: ElectricField
    desc: Output electric field with flattened (mean-removed) phase
  output_names:
  - out_ef
