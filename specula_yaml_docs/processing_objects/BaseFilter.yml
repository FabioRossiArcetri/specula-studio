BaseFilter:
  class_name: BaseFilter
  bases:
  - BaseProcessingObj
  parameters:
    simul_params:
      type: SimulParams
      default: REQUIRED
      kind: reference
    nfilter:
      type: int
      default: REQUIRED
      kind: value
    delay:
      type: float
      default: 0
      kind: value
    target_device_idx:
      type: Any
      default: null
      kind: value
    precision:
      type: Any
      default: null
      kind: value
  inputs:
    delta_comm:
      type: BaseValue
      kind: single
    gain_mod:
      type: BaseValue
      kind: single
  outputs:
  - out_comm
  - out_comm_no_delay
