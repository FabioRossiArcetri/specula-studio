TimeHistoryGenerator:
  class_name: TimeHistoryGenerator
  bases:
  - BaseGenerator
  parameters:
    time_hist:
      type: TimeHistory
      default: REQUIRED
      kind: reference
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs: {}
  outputs:
  - name: output
    type: BaseValue
    desc: Generated output signal
  output_names:
  - output
