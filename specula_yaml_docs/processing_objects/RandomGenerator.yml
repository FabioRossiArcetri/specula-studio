RandomGenerator:
  class_name: RandomGenerator
  bases:
  - BaseGenerator
  parameters:
    distribution:
      type: Any
      default: NORMAL
      kind: value
    amp:
      type: Any
      default: null
      kind: value
    constant:
      type: float
      default: 0.0
      kind: value
    seed:
      type: int
      default: null
      kind: value
    vsize:
      type: int
      default: 1
      kind: value
    output_size:
      type: int
      default: 1
      kind: value
    modal_rms:
      type: float
      default: null
      kind: value
    forced_zero_modes:
      type: int
      default: 0
      kind: value
    scaling_law:
      type: str
      default: INVERSE
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs: {}
  outputs:
  - name: output
    type: BaseValue
    desc: Generated output signal
  output_names:
  - output
