IdealDerivativeSensor:
  class_name: IdealDerivativeSensor
  bases:
  - BaseProcessingObj
  parameters:
    simul_params:
      type: SimulParams
      default: REQUIRED
      kind: reference
    subapdata:
      type: SubapData
      default: REQUIRED
      kind: reference
    fov:
      type: float
      default: REQUIRED
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_ef:
      type: ElectricField
      kind: single
      desc: Input electric field from which wavefront slopes are derived
  outputs:
  - name: out_slopes
    type: Slopes
    desc: Computed wavefront slopes from the ideal derivative sensor
  output_names:
  - out_slopes
