AtmoPropagation:
  class_name: AtmoPropagation
  bases:
  - BaseProcessingObj
  parameters:
    simul_params:
      type: SimulParams
      default: REQUIRED
      kind: reference
    source_dict:
      type: dict
      default: REQUIRED
      kind: reference
    doFresnel:
      type: bool
      default: false
      kind: value
    wavelengthInNm:
      type: float
      default: 500.0
      kind: value
    telescope_altitude_m:
      type: float
      default: null
      kind: value
    enable_chromatic_effect:
      type: bool
      default: false
      kind: value
    chromatic_reference_wavelengthInNm:
      type: float
      default: null
      kind: value
    pupil_position:
      type: Any
      default: null
      kind: value
    mergeLayersContrib:
      type: bool
      default: true
      kind: value
    upwards:
      type: bool
      default: false
      kind: value
    padding_factor:
      type: int
      default: 1
      kind: value
    target_device_idx:
      type: Any
      default: null
      kind: value
    precision:
      type: Any
      default: null
      kind: value
  inputs:
    atmo_layer_list:
      type: Layer
      kind: single
      desc: List of atmospheric turbulence layers (optional)
    common_layer_list:
      type: Layer
      kind: single
      desc: List of common turbulence layers shared across sources
  outputs:
  - name: out_{source_name}_ef
    type: ElectricField
    desc: Output electric field for source channel [source_name]
  output_names:
  - out_{source_name}_ef
