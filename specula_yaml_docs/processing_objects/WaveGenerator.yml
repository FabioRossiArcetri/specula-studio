WaveGenerator:
  class_name: WaveGenerator
  bases:
  - BaseGenerator
  parameters:
    wave_type:
      type: Any
      default: SIN
      kind: value
    amp:
      type: List[float]
      default:
      - 0.0
      kind: value
    freq:
      type: List[float]
      default:
      - 0.0
      kind: value
    offset:
      type: List[float]
      default:
      - 0.0
      kind: value
    constant:
      type: List[float]
      default:
      - 0.0
      kind: value
    slope:
      type: List[float]
      default:
      - 0.0
      kind: value
    output_size:
      type: int
      default: 1
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs: {}
  outputs:
  - name: output
    type: BaseValue
    desc: Generated output signal
  output_names:
  - output
