AtmoRandomPhase:
  class_name: AtmoRandomPhase
  bases:
  - BaseProcessingObj
  parameters:
    simul_params:
      type: SimulParams
      default: REQUIRED
      kind: reference
    L0:
      type: float
      default: 1.0
      kind: value
    data_dir:
      type: str
      default: ''
      kind: value
    source_dict:
      type: dict
      default: null
      kind: reference
    wavelengthInNm:
      type: float
      default: 500.0
      kind: value
    pixel_phasescreens:
      type: int
      default: 8192
      kind: value
    seed:
      type: int
      default: 1
      kind: value
    update_interval:
      type: int
      default: 1
      kind: value
    layer_height:
      type: float
      default: 0.0
      kind: value
    target_device_idx:
      type: Any
      default: null
      kind: value
    precision:
      type: Any
      default: null
      kind: value
  inputs:
    seeing:
      type: BaseValue
      kind: single
      desc: Atmospheric seeing value
    pupilstop:
      type: Pupilstop
      kind: single
      desc: Pupil stop mask defining the valid pupil area
  outputs:
  - name: out_{source_name_}layer
    type: Layer
    desc: Output phase-screen layer for named source [source_name]; if source name
      is None, key is out_layer
  - name: out_{source_name_}ef
    type: ElectricField
    desc: Output electric field for named source [source_name]; if source name is
      None, key is out_ef
  output_names:
  - out_{source_name_}layer
  - out_{source_name_}ef
