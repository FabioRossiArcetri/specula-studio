Coronagraph:
  class_name: Coronagraph
  bases:
  - BaseProcessingObj
  parameters:
    simul_params:
      type: SimulParams
      default: REQUIRED
      kind: reference
    wavelengthInNm:
      type: float
      default: REQUIRED
      kind: value
    fov:
      type: float
      default: REQUIRED
      kind: value
    fov_errinf:
      type: float
      default: 0.1
      kind: value
    fov_errsup:
      type: float
      default: 10
      kind: value
    fft_res:
      type: float
      default: 3.0
      kind: value
    center_on_pixel:
      type: bool
      default: true
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_ef:
      type: ElectricField
      kind: single
      desc: Input electric field from the telescope pupil
  outputs:
  - name: out_ef
    type: ElectricField
    desc: Output electric field after coronagraph mask application
  output_names:
  - out_ef
