MVM:
  class_name: MVM
  bases:
  - BaseProcessingObj
  parameters:
    recmat:
      type: Recmat
      default: REQUIRED
      kind: object
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_vector:
      type: BaseValue
      kind: single
      desc: Input vector to be multiplied by the reconstruction matrix
  outputs:
  - name: out_vector
    type: BaseValue
    desc: Output vector after matrix-vector multiplication
  output_names:
  - out_vector
