BaseSlicer:
  class_name: BaseSlicer
  bases:
  - BaseProcessingObj
  parameters:
    indices:
      type: Any
      default: null
      kind: value
    slice_args:
      type: Any
      default: null
      kind: value
    target_device_idx:
      type: Any
      default: null
      kind: value
    precision:
      type: Any
      default: null
      kind: value
  inputs:
    in_value:
      type: BaseValue
      kind: single
      desc: Input vector to slice
  outputs:
  - name: out_value
    type: BaseValue
    desc: Output sliced vector
  output_names:
  - out_value
