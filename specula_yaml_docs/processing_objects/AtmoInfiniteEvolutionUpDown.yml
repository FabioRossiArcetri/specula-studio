AtmoInfiniteEvolutionUpDown:
  class_name: AtmoInfiniteEvolutionUpDown
  bases:
  - AtmoInfiniteEvolution
  parameters:
    simul_params:
      type: SimulParams
      default: REQUIRED
      kind: reference
    L0:
      type: list
      default:
      - 1.0
      kind: value
    heights:
      type: list
      default:
      - 0.0
      kind: value
    Cn2:
      type: list
      default:
      - 1.0
      kind: value
    extra_delta_time_down:
      type: float
      default: 0
      kind: value
    extra_delta_time_up:
      type: float
      default: 0
      kind: value
    fov:
      type: float
      default: 0.0
      kind: value
    seed:
      type: int
      default: 1
      kind: value
    fov_in_m:
      type: float
      default: null
      kind: value
    pupil_position:
      type: list
      default:
      - 0
      - 0
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    seeing:
      type: BaseValue
      kind: single
      desc: Atmospheric seeing value
    wind_speed:
      type: BaseValue
      kind: single
      desc: Wind speed for each atmospheric layer
    wind_direction:
      type: BaseValue
      kind: single
      desc: Wind direction for each atmospheric layer
  outputs:
  - name: layer_list
    type: list
    desc: List of atmospheric infinite phase screen layers
  - name: layer_list_down
    type: list
    desc: List of atmospheric phase screen layers for downward propagation
  - name: layer_list_up
    type: list
    desc: List of atmospheric phase screen layers for upward propagation
  output_names:
  - layer_list
  - layer_list_down
  - layer_list_up
