MultirateComplementaryFilter:
  class_name: MultirateComplementaryFilter
  bases:
  - BaseFilter
  parameters:
    simul_params:
      type: SimulParams
      default: REQUIRED
      kind: reference
    iir_filter_data:
      type: IirFilterData
      default: REQUIRED
      kind: reference
    g_track:
      type: float
      default: REQUIRED
      kind: value
    weights:
      type: list
      default: REQUIRED
      kind: value
    N_list:
      type: list
      default: REQUIRED
      kind: value
    delay:
      type: float
      default: 0
      kind: value
    idx_yf:
      type: Any
      default: null
      kind: value
    idx_ys:
      type: Any
      default: null
      kind: value
    validate_sync:
      type: bool
      default: true
      kind: value
    target_device_idx:
      type: Any
      default: null
      kind: value
    precision:
      type: Any
      default: null
      kind: value
  inputs:
    in_yf:
      type: BaseValue
      kind: single
      desc: Fast sensor measurement vector (optional, use with in_ys)
    in_ys:
      type: BaseValue
      kind: single
      desc: List of slow sensor measurement vectors (optional, use with in_yf)
    in_vec:
      type: BaseValue
      kind: single
      desc: Combined measurement vector (optional, alternative to in_yf+in_ys)
    gain_mod:
      type: BaseValue
      kind: single
      desc: Optional gain modulation vector (optional)
  outputs:
  - name: out_comm
    type: BaseValue
    desc: Output fused command vector with delay applied
  - name: out_comm_no_delay
    type: BaseValue
    desc: Output fused command vector without delay (for POLC)
  output_names:
  - out_comm
  - out_comm_no_delay
