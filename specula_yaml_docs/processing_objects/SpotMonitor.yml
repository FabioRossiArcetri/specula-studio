SpotMonitor:
  class_name: SpotMonitor
  bases:
  - BaseProcessingObj
  parameters:
    subapdata:
      type: SubapData
      default: REQUIRED
      kind: reference
    initial_alpha:
      type: float
      default: 2.0
      kind: value
    initial_gamma:
      type: float
      default: 3.0
      kind: value
    bounds_alpha:
      type: Any
      default:
      - 0.5
      - 10.0
      kind: value
    bounds_gamma:
      type: Any
      default:
      - 0.1
      - null
      kind: value
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_pixels:
      type: Pixels
      kind: single
      desc: Input pixel image from WFS detector
  outputs:
  - name: out_sum_pixels
    type: Pixels
    desc: Summed subaperture image
  - name: out_model_pixels
    type: Pixels
    desc: Fitted Moffat model image
  - name: out_residual_pixels
    type: Pixels
    desc: Residuals between data and model
  - name: out_params
    type: BaseValue
    desc: Moffat fit parameters [amplitude, x0, y0, gamma, alpha, sky, fwhm, chi2,
      success]
  output_names:
  - out_sum_pixels
  - out_model_pixels
  - out_residual_pixels
  - out_params
