ElectricFieldReflection:
  class_name: ElectricFieldReflection
  bases:
  - BaseProcessingObj
  parameters:
    target_device_idx:
      type: int
      default: null
      kind: value
    precision:
      type: int
      default: null
      kind: value
  inputs:
    in_ef:
      type: ElectricField
      kind: single
      desc: Input electric field to reflect (phase sign is inverted)
  outputs:
  - name: out_ef
    type: ElectricField
    desc: Output electric field with reflected (sign-inverted) phase
  output_names:
  - out_ef
