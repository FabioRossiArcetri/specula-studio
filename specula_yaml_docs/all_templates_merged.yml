APPCoronagraph:
  bases:
  - Coronagraph
  class_name: APPCoronagraph
  inputs:
    in_ef:
      desc: Input electric field from the telescope pupil
      kind: single
      type: ElectricField
  output_names:
  - out_ef
  outputs:
  - desc: Output electric field after coronagraph mask application
    name: out_ef
    type: ElectricField
  parameters:
    beta:
      default: 0.9
      kind: value
      type: float
    contrastInDarkHole:
      default: REQUIRED
      kind: value
      type: float
    fft_res:
      default: 3.0
      kind: value
      type: float
    iwaInLambdaOverD:
      default: REQUIRED
      kind: value
      type: float
    make_symmetric:
      default: false
      kind: value
      type: bool
    max_its:
      default: 1000
      kind: value
      type: int
    owaInLambdaOverD:
      default: REQUIRED
      kind: value
      type: float
    precision:
      default: null
      kind: value
      type: int
    pupil:
      default: REQUIRED
      kind: value
      type: Any
    simul_params:
      default: REQUIRED
      kind: reference
      type: SimulParams
    target_device_idx:
      default: null
      kind: value
      type: int
    wavelengthInNm:
      default: REQUIRED
      kind: value
      type: float
